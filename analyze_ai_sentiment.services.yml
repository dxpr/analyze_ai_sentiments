services:
  analyze_ai_sentiment.storage:
    class: Drupal\analyze_ai_sentiment\Service\SentimentStorageService
    arguments: ['@database', '@config.factory', '@entity_type.manager', '@renderer', '@language_manager']

  analyze_ai_sentiment.batch_service:
    class: Drupal\analyze_ai_sentiment\Service\SentimentBatchService
    arguments: ['@entity_type.manager', '@analyze_ai_sentiment.storage']